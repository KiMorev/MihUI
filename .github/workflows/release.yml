name: Release UI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pack external UI
        run: |
          mkdir -p dist
          cp index.html styles.css app.js dist/
          cp mihomo-editor.html dist/
          cd dist
          zip -r ../webmihomo-ui.zip .
          cd ..
          sha256sum webmihomo-ui.zip > webmihomo-ui.zip.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webmihomo-ui.zip
            webmihomo-ui.zip.sha256
